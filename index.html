<!DOCTYPE html>
<html>
<head>
  <title>UPDATE TRANSAKSI SUMBAR 2027</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 15px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin: 10px 0;
      border-radius: 12px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .info {
      flex: 1;
    }

    /* CIRCLE FIX TOTAL */
    .circle {
      position: relative;
      width: 60px;
      height: 60px;
      min-width: 60px;
    }

    .circle svg {
      width: 60px;
      height: 60px;
      transform: rotate(-90deg);
    }

    .circle circle {
      fill: none;
      stroke-width: 6;
      stroke: #334155;
    }

    .circle circle.progress {
      stroke-dasharray: 220;
      transition: stroke-dashoffset 0.8s ease;
    }

    .circle .number {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 12px;
      font-weight: bold;
    }

    details {
      margin-top: 10px;
    }

    a {
      color: #38bdf8;
    }
  </style>
</head>

<body>

<h1>📊 Status Tabungan</h1>
<div id="data">Loading...</div>

<script>
const API = "https://opensheet.elk.sh/1yTxjTY_ldTZ4qW-XnXP6oKHwC20j5dqLGelwfV9l2P8/Sheet1";

fetch(API)
  .then(res => res.json())
  .then(data => {
    let html = "";

    data.forEach(user => {

      let months = [
        "Mar 2026","Apr 2026","Mei 2026","Jun 2026","Jul 2026","Agu 2026",
        "Sep 2026","Okt 2026","Nov 2026","Des 2026","Jan 2027","Feb 2027"
      ];

      let bayar = 0;
      let lastBayar = "-";
      let history = "";

      months.forEach(m => {
        let tgl = user[m + " Tanggal"];
        let bukti = user[m + " Bukti"];

        if (tgl && tgl !== "-") {
          bayar++;
          lastBayar = m;

          history += `
            <p>📅 ${m} - ${tgl} 
            ${bukti ? `<a href="${bukti}" target="_blank">[Bukti]</a>` : ""}
            </p>
          `;
        }
      });

      let persen = Math.floor((bayar / 12) * 100);
      let warna = persen >= 80 ? "#22c55e" : persen >= 50 ? "#eab308" : "#ef4444";
      let offset = 220 - (220 * persen / 100);

      let circle = `
      <div class="circle">
        <svg>
          <circle cx="30" cy="30" r="26"></circle>
          <circle class="progress" cx="30" cy="30" r="26"
            style="stroke:${warna}; stroke-dashoffset:${offset}">
          </circle>
        </svg>
        <div class="number">${persen}%</div>
      </div>
      `;

      html += `
      <div class="card">
        <div class="row">

          <div class="info">
            <h2>${user.Nama}</h2>
            <p>Total Bayar: ${bayar} bulan</p>
            <p>📅 Terakhir bayar: ${lastBayar}</p>
          </div>

          ${circle}

        </div>

        <details>
          <summary>📜 Lihat Riwayat</summary>
          ${history || "<p>Belum ada pembayaran</p>"}
        </details>
      </div>
      `;
    });

    document.getElementById("data").innerHTML = html;
  })
  .catch(err => {
    document.getElementById("data").innerHTML = "❌ ERROR LOAD DATA";
  });
</script>

</body>
</html>
