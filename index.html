<!DOCTYPE html>
<html>
<head>
  <title>Status Tabungan</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }
    .card {
      background: #1e293b;
      padding: 15px;
      margin: 10px;
      border-radius: 10px;
    }
    .green { color: #22c55e; }
    .red { color: #ef4444; }
  </style>
</head>
<body>

<h1>📊 Status Tabungan</h1>
<div id="data"></div>

<script>
const API = "https://opensheet.elk.sh/1yTxjTY_ldTZ4qW-XnXP6oKHwC20j5dqLGelwfV9l2P8/Sheet1";

fetch(API)
  .then(res => res.json())
  .then(data => {
    let html = "";

    data.forEach(user => {

      let months = [
      "Mar 2026","Apr 2026","Mei 2026","Jun 2026","Jul 2026","Agu 2026",
      "Sep 2026","Okt 2026","Nov 2026","Des 2026","Jan 2027","Feb 2027"
    ];

    let bayar = 0;
    let lastBayar = "-";
    let history = "";

    months.forEach(m => {
      let tgl = user[m + " Tanggal"];
      let bukti = user[m + " Bukti"];

      if (tgl && tgl !== "-") {
        bayar++;
        lastBayar = m;

        history += `
          <p>📅 ${m} - ${tgl} 
          ${bukti ? `<a href="${bukti}" target="_blank">[Bukti]</a>` : ""}</p>
        `;
      }
    });

    let persen = Math.floor((bayar / 12) * 100);

    html += `
      <div class="card">
        <h2>${user.Nama}</h2>
        <p>Total Bayar: ${bayar} bulan</p>
        <p>📅 Terakhir bayar: ${lastBayar}</p>
        <p class="${persen == 100 ? 'green' : 'red'}">
          Progress: ${persen}%
        </p>

        <details>
          <summary>📜 Lihat Riwayat</summary>
          ${history || "<p>Belum ada pembayaran</p>"}
        </details>
      </div>
    `;
    });

    document.getElementById("data").innerHTML = html;
  });
</script>

</body>
</html>
