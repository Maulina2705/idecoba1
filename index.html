<!DOCTYPE html>
<html>
   <head>
      <title>UPDATE TABUNGAN 2027</title>
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
      <style>
         :root {
         --bg: #0f172a;
         --card: #1e293b;
         --text: #ffffff;
         }
         body.light {
         --bg: #f1f5f9;
         --card: #ffffff;
         --text: #0f172a;
         }
         body {
         font-family: 'Poppins', sans-serif;
         background: var(--bg);
         color: var(--text);
         padding: 15px;
         transition: 0.3s;
         }
         h1 {
         text-align: center;
         margin-bottom: 20px;
         font-weight: 600;
         }
         .toggle {
         text-align: center;
         margin-bottom: 15px;
         }
         .btn {
         padding: 6px 12px;
         border-radius: 8px;
         border: none;
         cursor: pointer;
         }
         .card {
         background: var(--card);
         padding: 15px;
         margin: 10px 0;
         border-radius: 14px;
         transition: 0.3s;
         }
         .row {
         display: flex;
         justify-content: space-between;
         align-items: center;
         gap: 10px;
         }
         .name-box {
         display: inline-block;
         padding: 5px 10px;
         border-radius: 8px;
         margin-bottom: 5px;
         font-weight: 700;
         background: rgba(255,255,255,0.05);
         }
         .circle {
         position: relative;
         width: 60px;
         height: 60px;
         }
         .circle svg {
         width: 60px;
         height: 60px;
         transform: rotate(-90deg);
         }
         .circle circle {
         fill: none;
         stroke-width: 6;
         stroke: #334155;
         }
         .circle circle.progress {
         stroke-dasharray: 220;
         transition: 0.8s;
         }
         .circle .number {
         position: absolute;
         top: 50%;
         left: 50%;
         transform: translate(-50%, -50%);
         font-size: 12px;
         }
         details {
         margin-top: 10px;
         font-size: 13px;
         }
      </style>
   </head>
   <body>
      <h1>UPDATE TABUNGAN 2027</h1>
      <div class="toggle">
         <button class="btn" onclick="toggleMode()">Toggle Mode</button>
      </div>
      <div id="data">Loading...</div>
      <script>
         function toggleMode() {
           document.body.classList.toggle("light");
         }
         
         const API = "https://opensheet.elk.sh/1yTxjTY_ldTZ4qW-XnXP6oKHwC20j5dqLGelwfV9l2P8/Sheet1";
         
         fetch(API)
         .then(res => res.json())
         .then(data => {
         
           let html = "";
         
           data.forEach(user => {
         
             let months = [
               "Mar 2026","Apr 2026","Mei 2026","Jun 2026","Jul 2026","Agu 2026",
               "Sep 2026","Okt 2026","Nov 2026","Des 2026","Jan 2027","Feb 2027"
             ];
         
             let bayar = 0;
             let lastBayar = "-";
             let history = "";
         
             months.forEach(m => {
               let tgl = user[m + " Tanggal"];
               let bukti = user[m + " Bukti"];
         
               if (tgl && tgl !== "-") {
                 bayar++;
                 lastBayar = m;
         
                 history += `
                   <p>${m} - ${tgl} 
                   ${bukti ? `<a href="${bukti}" target="_blank">[Bukti]</a>` : ""}
                   </p>
                 `;
               }
             });
         
             let persen = Math.floor((bayar / 12) * 100);
             let warna = persen >= 80 ? "#22c55e" : persen >= 50 ? "#eab308" : "#ef4444";
             let offset = 220 - (220 * persen / 100);
         
             let circle = `
             <div class="circle">
               <svg>
                 <circle cx="30" cy="30" r="26"></circle>
                 <circle class="progress" cx="30" cy="30" r="26"
                   style="stroke:${warna}; stroke-dashoffset:${offset}">
                 </circle>
               </svg>
               <div class="number">${persen}%</div>
             </div>
             `;
         
             // ================= LOGIC BARU =================
             let today = new Date();
             let tanggal = today.getDate();
             let bulanSekarang = today.toLocaleString('id-ID', { month: 'short' });
         let tahunSekarang = today.getFullYear();
         
         // mapping manual biar sama dengan format kamu
         let mapBulan = {
           "Jan": "Jan",
           "Feb": "Feb",
           "Mar": "Mar",
           "Apr": "Apr",
           "Mei": "Mei",
           "Jun": "Jun",
           "Jul": "Jul",
           "Agu": "Agu",
           "Sep": "Sep",
           "Okt": "Okt",
           "Nov": "Nov",
           "Des": "Des"
         };
         
         // cari bulan yang cocok di data
         let currentMonth = months.find(m => 
           m.includes(mapBulan[bulanSekarang]) && m.includes(tahunSekarang)
         );
         
             let sudahBayarBulanIni = user[currentMonth + " Tanggal"] && user[currentMonth + " Tanggal"] !== "-";
         
             let nameStyle = "";
             let cardStyle = "";
             let warningIcon = "";
         
             // bulan baru belum bayar → kuning
             if (!sudahBayarBulanIni) {
               nameStyle = "color:#eab308;";
               warningIcon = " ⚠️";
             }
         
             // lewat tanggal 10 → merah
             if (tanggal > 10 && !sudahBayarBulanIni) {
               nameStyle = "color:#ef4444;";
               cardStyle = "border:2px solid #ef4444; background:rgba(239,68,68,0.15); box-shadow:0 0 10px rgba(239,68,68,0.4);";
               warningIcon = " ⚠️";
             }
             // =============================================
         
             html += `
             <div class="card" style="${cardStyle}">
               <div class="row">
         
                 <div class="info">
                   <div class="name-box" style="${nameStyle}">
                     ${user.Nama}${warningIcon}
                   </div>
                   <p>Total Bayar: ${bayar} bulan</p>
                   <p>Terakhir bayar: ${lastBayar}</p>
                 </div>
         
                 ${circle}
         
               </div>
         
               <details>
                 <summary>Lihat Riwayat</summary>
                 ${history || "<p>Belum ada pembayaran</p>"}
               </details>
             </div>
             `;
           });
         
           document.getElementById("data").innerHTML = html;
         });
      </script>
   </body>
</html>
