<script>
const API = "https://opensheet.elk.sh/1yTxjTY_ldTZ4qW-XnXP6oKHwC20j5dqLGelwfV9l2P8/Sheet1";

fetch(API)
  .then(res => res.json())
  .then(data => {
    const container = document.querySelector(".container");
    container.innerHTML = "";

    data.forEach((row, i) => {

      // HITUNG PROGRESS (misal dari 24 kolom)
      let filled = 0;
      let total = 24;

      Object.values(row).forEach(val => {
        if(val && val.trim() !== "") filled++;
      });

      let percent = Math.round((filled / total) * 100);

      // AMBIL NAMA
      let nama = row["Nama"] || "User";

      // AMBIL BULAN TERAKHIR
      let lastPay = "-";
      let keys = Object.keys(row);

      for(let k of keys.reverse()){
        if(row[k] && row[k].trim() !== ""){
          lastPay = k;
          break;
        }
      }

      // BUAT CARD
      let card = `
        <div class="card">
          <div class="info">
            <div class="name">${nama}</div>
            <div class="detail">💰 Total: ${filled} bulan</div>
            <div class="detail">📅 Terakhir: ${lastPay}</div>
            <button class="btn">Riwayat</button>
          </div>

          <div class="progress" id="p${i}">
            <span>${percent}%</span>
          </div>
        </div>
      `;

      container.innerHTML += card;

      // SET PROGRESS
      setTimeout(() => {
        setProgress("p"+i, percent);
      }, 10);

    });
  });
</script>
